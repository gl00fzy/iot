<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Tracking - Correct Current Position</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 20px; font-family: 'Tahoma', sans-serif; background-color: #f0f2f5; }
        #map { height: 750px; width: 100%; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .header { margin-bottom: 20px; text-align: center; }
        h2 { color: #1a73e8; margin: 0; }
        .status-tag { font-size: 13px; color: #666; margin-top: 5px; }
        .popup-info { line-height: 1.6; }
        .popup-info b { color: #1a73e8; }
    </style>
</head>
<body>

    <div class="header">
        <h2>ระบบติดตามรถขนส่ง (Real-time)</h2>
        <div class="status-tag">ไอคอนรถจะอยู่ที่ตำแหน่งล่าสุดเสมอ | เส้นทางย้อนหลัง 20 จุด</div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. ตั้งค่าแผนที่
        const map = L.map('map').setView([16.24836, 103.24779], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const vehicles = {};

        // 2. ฟังก์ชันแปลงเวลา
        function formatTime(unixTimestamp) {
            const date = new Date(unixTimestamp * 1000);
            return date.toLocaleString('th-TH');
        }

        // 3. ฟังก์ชันสุ่มสีเส้น
        function getBrightColor() {
            return `hsl(${Math.random() * 360}, 85%, 45%)`;
        }

        // 4. ฟังก์ชัน OSRM Snap to Road
        async function getRoadPath(coords) {
            if (coords.length < 2) return coords;
            const query = coords.map(c => `${c[1]},${c[0]}`).join(';');
            const url = `https://router.project-osrm.org/match/v1/driving/${query}?geometries=geojson&overview=full`;

            try {
                const res = await fetch(url);
                const result = await res.json();
                if (result.code === 'Ok' && result.matchings[0]) {
                    return result.matchings[0].geometry.coordinates.map(c => [c[1], c[0]]);
                }
            } catch (e) { console.warn("OSRM error:", e); }
            return coords;
        }

        // 5. ฟังก์ชันหลักในการดึงข้อมูลและอัปเดต
        async function updateTracking() {
            try {
                const response = await fetch('http://45.136.255.138:1880/get-tracks/');
                const data = await response.json();

                for (const carId in data) {
                    // เรียงจาก อดีต -> ปัจจุบัน (เพื่อให้เส้นลากมาหาจุดล่าสุด)
                    let rawPoints = data[carId]
                        .sort((a, b) => a.tst - b.tst) 
                        .slice(-20); 

                    if (rawPoints.length === 0) continue;

                    // จุดปัจจุบันคือจุด "สุดท้าย" ของ Array ที่เรียงเวลาแล้ว
                    const lastData = rawPoints[rawPoints.length - 1]; 
                    const currentPos = [lastData.lat, lastData.lon];
                    
                    // เตรียมพิกัดสำหรับทำเส้นทางล้อถนน
                    const latLngs = rawPoints.map(p => [p.lat, p.lon]);
                    const roadPath = await getRoadPath(latLngs);

                    const popupContent = `
                        <div class="popup-info">
                            <b>รหัสรถ:</b> ${carId}<br>
                            <b>ละติจูด:</b> ${lastData.lat}<br>
                            <b>ลองจิจูด:</b> ${lastData.lon}<br>
                            <b>อัปเดตเมื่อ:</b> ${formatTime(lastData.tst)}
                        </div>
                    `;

                    if (!vehicles[carId]) {
                        // สร้างรถใหม่
                        const carColor = getBrightColor();
                        const carIcon = L.icon({
                            iconUrl: `${carId}.png`,
                            iconSize: [40, 40],
                            iconAnchor: [20, 20],
                            popupAnchor: [0, -20]
                        });

                        const marker = L.marker(currentPos, { icon: carIcon }).addTo(map)
                            .bindPopup(popupContent);

                        const polyline = L.polyline(roadPath, {
                            color: carColor,
                            weight: 5,
                            opacity: 0.7,
                            lineJoin: 'round'
                        }).addTo(map);

                        vehicles[carId] = { marker, polyline, color: carColor };
                    } else {
                        // อัปเดตตำแหน่งรถ (Marker) ไปที่จุดล่าสุด
                        vehicles[carId].marker.setLatLng(currentPos).setPopupContent(popupContent);
                        // อัปเดตเส้นทาง
                        vehicles[carId].polyline.setLatLngs(roadPath);
                    }
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        // เริ่มต้นทำงาน
        updateTracking();
        setInterval(updateTracking, 10000); // อัปเดตทุก 10 วินาที

    </script>
</body>
</html>
